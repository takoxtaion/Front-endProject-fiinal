<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootZone - Teams</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- navigation bar -->
    <header>
        <nav class="navbar">
            <h1 class="logo">Foot<span>Zone</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="teams.html" class="active">Teams</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="teams-section">
        <h2 class="section-title" id="teamsTitle">Premier League Teams</h2>

        <!-- league filter buttons -->
        <div class="league-filters" id="leagueFilters">
            <button class="filter-btn active" data-league="English Premier League">Premier League</button>
            <button class="filter-btn" data-league="Spanish La Liga">La Liga</button>
            <button class="filter-btn" data-league="Italian Serie A">Serie A</button>
            <button class="filter-btn" data-league="German Bundesliga">Bundesliga</button>
            <button class="filter-btn" data-league="French Ligue 1">Ligue 1</button>
            <button class="filter-btn" data-league="Georgian Erovnuli Liga">Erovnuli Liga</button>
        </div>

        <!-- search input -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search team...">
        </div>

        <p id="loading" class="loading-text">Loading teams...</p>

        <!-- teams will be added here with javascript -->
        <div class="team-grid" id="teamGrid"></div>
    </section>

    <!-- footer -->
    <footer>
        <p>FootZone &copy; 2026 | BTU Final Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
