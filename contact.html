<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootZone - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">Foot<span>Zone</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="teams.html">Teams</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <h2 class="section-title">Contact Us</h2>
        <p class="contact-intro">Have a question or suggestion? Send us a message!</p>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name">
                <p class="error" id="nameError"></p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Your email">
                <p class="error" id="emailError"></p>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Your message"></textarea>
                <p class="error" id="messageError"></p>
            </div>

            <button type="submit" class="btn">Send Message</button>
            <p id="successMsg" class="success"></p>
        </form>
    </section>

    <footer>
        <p>FootZone &copy; 2026 | BTU Final Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
